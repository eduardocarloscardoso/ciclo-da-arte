<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap de Marketing — Ciclo da Arte</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --accent: #c9a96e;
    --f1: #2a4a7f; --f1l: #3d6ab5;
    --f2: #4a2a7f; --f2l: #6b3db5;
    --f3: #7f2a4a; --f3l: #b53d6b;
    --f4: #2a7f4a; --f4l: #3db56b;
    --f5: #7f5a2a; --f5l: #b5823d;
    --f6: #2a6a7f; --f6l: #3d9ab5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 60px 40px 40px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -100px; left: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(201,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .logo-line {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.5;transform:scale(1.4)}
  }
  .logo-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
  }
  h1 span { color: var(--accent); }
  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* STATS */
  .stats {
    display: flex; gap: 32px;
    margin-top: 32px;
    flex-wrap: wrap;
  }
  .stat {
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* MAIN */
  main { padding: 40px; max-width: 1400px; margin: 0 auto; }

  /* FASE BLOCK */
  .fase-block {
    margin-bottom: 40px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from{opacity:0;transform:translateY(16px)}
    to{opacity:1;transform:translateY(0)}
  }
  .fase-block:nth-child(1){animation-delay:.05s}
  .fase-block:nth-child(2){animation-delay:.1s}
  .fase-block:nth-child(3){animation-delay:.15s}
  .fase-block:nth-child(4){animation-delay:.2s}
  .fase-block:nth-child(5){animation-delay:.25s}
  .fase-block:nth-child(6){animation-delay:.3s}

  .fase-header {
    display: flex; align-items: center; gap: 20px;
    padding: 20px 28px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .fase-header:hover { background: rgba(255,255,255,0.02); }

  .fase-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .fase-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    flex: 1;
  }
  .fase-count {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .fase-toggle {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: transform 0.3s;
    font-size: 18px;
  }
  .fase-block.open .fase-toggle { transform: rotate(180deg); }

  /* TABLE */
  .fase-body { display: none; }
  .fase-block.open .fase-body { display: block; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead tr {
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-right: 1px solid var(--border);
  }
  thead th:last-child { border-right: none; }

  tbody tr {
    border-top: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td {
    padding: 13px 16px;
    vertical-align: middle;
    border-right: 1px solid var(--border);
    color: var(--text);
  }
  td:last-child { border-right: none; }

  .td-num {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    width: 48px;
  }
  .td-tarefa { font-weight: 400; line-height: 1.5; }
  .td-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    padding: 4px 2px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 100px;
  }
  .td-input:focus { border-color: var(--accent); }
  .td-input::placeholder { color: var(--muted); font-size: 12px; }

  .status-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
    width: 120px;
  }
  .status-select:focus { border-color: var(--accent); }

  /* FASE COLORS */
  .f1 .fase-header { border-left: 3px solid var(--f1l); }
  .f2 .fase-header { border-left: 3px solid var(--f2l); }
  .f3 .fase-header { border-left: 3px solid var(--f3l); }
  .f4 .fase-header { border-left: 3px solid var(--f4l); }
  .f5 .fase-header { border-left: 3px solid var(--f5l); }
  .f6 .fase-header { border-left: 3px solid var(--f6l); }

  .f1 .fase-badge { background: rgba(42,74,127,.3); color: #7ab0ff; }
  .f2 .fase-badge { background: rgba(74,42,127,.3); color: #b07aff; }
  .f3 .fase-badge { background: rgba(127,42,74,.3); color: #ff7aaa; }
  .f4 .fase-badge { background: rgba(42,127,74,.3); color: #7affa8; }
  .f5 .fase-badge { background: rgba(127,90,42,.3); color: #ffca7a; }
  .f6 .fase-badge { background: rgba(42,106,127,.3); color: #7adeff; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  @media print {
    body { background: white; color: black; }
    .fase-body { display: block !important; }
    .fase-toggle { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-line">
    <div class="logo-dot"></div>
    <span class="logo-text">Ciclo da Arte</span>
  </div>
  <h1>Roadmap de <span>Marketing</span></h1>
  <p class="subtitle">Plano de ações estratégicas — 2026</p>
  <div class="stats">
    <div class="stat"><span class="stat-num">6</span><span class="stat-label">Fases</span></div>
    <div class="stat"><span class="stat-num">33</span><span class="stat-label">Tarefas</span></div>
    <div class="stat"><span class="stat-num">2026</span><span class="stat-label">Ano</span></div>
  </div>
</header>

<main id="roadmap"></main>

<footer>© 2026 Ciclo da Arte — Roadmap de Marketing</footer>

<script>
const fases = [
  { id:'f1', label:'FASE 1', title:'Diagnóstico e Auditoria Digital', tarefas:[
    'Mapear páginas com maior taxa de abandono',
    'Testar velocidade com Google PageSpeed',
    'Revisar fluxo completo do checkout',
    'Documentar problemas e priorizar correções',
    'Analisar funil de conversão no GA4',
    'Definir metas de conversão (meta: 1,2%)',
  ]},
  { id:'f2', label:'FASE 2', title:'Identidade de Marca e Posicionamento', tarefas:[
    'Definir proposta de valor e diferenciais Ciclo da Arte',
    'Revisar personas e público-alvo',
    'Alinhar tom de voz e linguagem visual',
    'Criar guia de marca atualizado',
  ]},
  { id:'f3', label:'FASE 3', title:'Produção de Conteúdo e Copy', tarefas:[
    'Pesquisar anúncios dos concorrentes no Meta Ads Library',
    'Redigir copy para campanha de topo de funil (Facebook)',
    'Redigir copy para campanha de fundo de funil',
    'Produzir calendário editorial mensal (Instagram/Facebook)',
    'Criar roteiros de vídeos curtos (Reels/TikTok)',
    'Revisar e aprovar copies com gestora',
  ]},
  { id:'f4', label:'FASE 4', title:'Tráfego Pago — Meta & Google Ads', tarefas:[
    'Estruturar campanhas no Meta Ads (awareness + conversão)',
    'Configurar pixel do Meta e eventos de conversão',
    'Criar campanhas de Google Shopping',
    'Definir orçamento diário por campanha',
    'Monitorar ROAS semanalmente e otimizar',
    'Relatório quinzenal de desempenho das campanhas',
  ]},
  { id:'f5', label:'FASE 5', title:'E-mail Marketing e CRM', tarefas:[
    'Segmentar base de contatos por comportamento de compra',
    'Criar fluxo de boas-vindas automatizado',
    'Criar fluxo de recuperação de carrinho abandonado',
    'Produzir newsletter mensal com ofertas e novidades',
    'Configurar régua de pós-venda e pesquisa NPS',
  ]},
  { id:'f6', label:'FASE 6', title:'Análise, IA e Automações', tarefas:[
    'Implementar dashboard de métricas de marketing (GA4 + Looker)',
    'Integrar IA para respostas automáticas no WhatsApp',
    'Automatizar relatórios de performance com IA',
    'Testar geração de copies com IA (Claude / ChatGPT)',
    'Revisar processos e documentar ganhos com IA',
    'Planejar próxima onda de automações por área',
  ]},
];

const main = document.getElementById('roadmap');

fases.forEach((f, fi) => {
  const block = document.createElement('div');
  block.className = `fase-block ${f.id} open`;

  block.innerHTML = `
    <div class="fase-header" onclick="toggle(this)">
      <span class="fase-badge">${f.label}</span>
      <span class="fase-title">${f.title}</span>
      <span class="fase-count">${f.tarefas.length} tarefas</span>
      <span class="fase-toggle">▾</span>
    </div>
    <div class="fase-body">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome da Tarefa</th>
            <th>Data Início</th>
            <th>Data Fim</th>
            <th>Responsável</th>
            <th>Observação</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${f.tarefas.map((t,i) => `
          <tr>
            <td class="td-num">${i+1}</td>
            <td class="td-tarefa">${t}</td>
            <td><input class="td-input" type="date" title="Data Início"></td>
            <td><input class="td-input" type="date" title="Data Fim"></td>
            <td><input class="td-input" type="text" placeholder="Responsável"></td>
            <td><input class="td-input" type="text" placeholder="Observação..."></td>
            <td>
              <select class="status-select">
                <option value="">— Status —</option>
                <option value="pendente">⏳ Pendente</option>
                <option value="em_andamento">🔄 Em andamento</option>
                <option value="concluido">✅ Concluído</option>
                <option value="bloqueado">🚫 Bloqueado</option>
              </select>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
  main.appendChild(block);
});

function toggle(header) {
  header.parentElement.classList.toggle('open');
}
</script>
</body>
</html>
